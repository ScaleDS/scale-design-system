<!doctype html>
<!-- data-theme is REQUIRED — Scale's tokens are defined per theme on <html>. -->
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scale starter</title>
    <!-- No font setup needed — Scale bundles the Inter typeface and loads it
         via @font-face when you import its tokens (see src/styles.scss). -->
  </head>
  <body>
    <main class="home">
      <sc-logo size="l"></sc-logo>

      <div class="home__text">
        <h1>Welcome to Scale</h1>
        <p>
          Start building by clearing the contents of this page and adding
          components like this:
        </p>
      </div>

      <div class="scd-demo-code">
        <code id="cmd">import '@scale-ds/scale-design-system/components/sc-button'</code>
        <sc-button id="copy" type="tertiary" size="s" leading-icon="copy">Copy</sc-button>
      </div>

      <nav class="home__links" aria-label="Resources">
        <a href="https://scaledesignsystem.com" target="_blank" rel="noreferrer">Docs</a>
        <span class="home__sep" aria-hidden="true"></span>
        <a href="https://scaledesignsystem.com/components/accordion/" target="_blank" rel="noreferrer">Components</a>
      </nav>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
